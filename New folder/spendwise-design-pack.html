<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#EDEAE3; font-family:'Plus Jakarta Sans',system-ui,sans-serif; }
  .page { width:1260px; margin:0 auto; padding:64px 48px 72px; }
  .phone-row { display:flex; gap:28px; flex-wrap:wrap; margin-top:32px; }
  .phone-frame { border-radius:40px; overflow:hidden; box-shadow:0 20px 56px rgba(0,0,0,0.11),0 4px 12px rgba(0,0,0,0.07); flex-shrink:0; position:relative; }

</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ThemeCtx = createContext(null);
const useTheme = () => useContext(ThemeCtx);

    mono:"'IBM Plex Mono', monospace",

    heroText:'#FFFFFF', pill:999,

  paper: {

    bg:'#F0EDE5', surface:'#E6E3DB', card:'#FAF8F3', border:'#D4CFBF',
    ink:'#15130D', ink2:'#4A4538', ink3:'#8A857A',
    accent:'#C1440E', accentBg:'#FBEEE8',
    ok:'#3D7A4F', danger:'#C1440E', warn:'#B87333',
    font:"'Plus Jakarta Sans', system-ui, sans-serif",
    mono:"'JetBrains Mono', monospace",
    hero:null, heroText:'#15130D', pill:10,
  },
  coral: {
    id:'coral', name:'Warm Coral', tagline:'Off-white · terracotta · friendly warmth',
    bg:'#FFF8F4', surface:'#FFF0E8', card:'#FFFFFF', border:'#F0D8CC',
    ink:'#200E07', ink2:'#7A4030', ink3:'#C09078',
    accent:'#E8604A', accentBg:'#FDEAE5',
    ok:'#2A8C5F', danger:'#C0392B', warn:'#E67E22',
    font:"'DM Sans', system-ui, sans-serif",
    mono:"'DM Mono', monospace",
    hero:null, heroText:'#200E07', pill:14,
  },
  minimal: {
    id:'minimal', name:'Soft Minimal', tagline:'Near-white · slate accents · calm precision',
    bg:'#FAFAF9', surface:'#F2F2F0', card:'#FFFFFF', border:'#E4E4DE',
    ink:'#1C1C1A', ink2:'#6B6B64', ink3:'#ACACAA',
    accent:'#18181B', accentBg:'#F0F0EE',
    ok:'#15803D', danger:'#DC2626', warn:'#D97706',
    font:"'Plus Jakarta Sans', system-ui, sans-serif",
    mono:"'IBM Plex Mono', monospace",
    hero:null, heroText:'#1C1C1A', pill:8,
  },
};

// ─── Sample data ──────────────────────────────────────────────────────────────
const TXNS = [
  { id:1, name:'Zomato Order',     cat:'Food',      amt:'₹340',    neg:true,  icon:'🍕', date:'Today'     },
  { id:2, name:'Salary Credit',    cat:'Income',    amt:'₹45,000', neg:false, icon:'💼', date:'Today'     },
  { id:3, name:'Auto Rickshaw',    cat:'Transport', amt:'₹120',    neg:true,  icon:'🛺', date:'Yesterday' },
  { id:4, name:'D-Mart Grocery',   cat:'Shopping',  amt:'₹1,840',  neg:true,  icon:'🛒', date:'Yesterday' },
  { id:5, name:'Jio Recharge',     cat:'Bills',     amt:'₹399',    neg:true,  icon:'📱', date:'18 May'    },
];

const BUDGETS = [
  { cat:'Food & Dining',    spent:8200,  total:12000, clr:'#E8604A' },
  { cat:'Transport',        spent:3400,  total:5000,  clr:'#533AFD' },
  { cat:'Shopping',         spent:6800,  total:8000,  clr:'#F59E0B' },
  { cat:'Bills & Utilities',spent:5100,  total:6000,  clr:'#10B981' },
  { cat:'Entertainment',    spent:2300,  total:4000,  clr:'#8B5CF6' },
];

const ACCOUNTS = [
  { name:'HDFC Savings',  num:'••4521', bal:'₹45,200', bg:'#1A56DB' },
  { name:'SBI Current',   num:'••7803', bal:'₹18,750', bg:'#0891B2' },
  { name:'Cash Wallet',   num:'',       bal:'₹4,500',  bg:'#059669' },
];

const REPORT_CATS = [
  { name:'Food & Dining',  pct:32, amt:'₹8,200',  clr:'#E8604A' },
  { name:'Shopping',       pct:26, amt:'₹6,800',  clr:'#533AFD' },
  { name:'Bills',          pct:20, amt:'₹5,100',  clr:'#10B981' },
  { name:'Transport',      pct:13, amt:'₹3,400',  clr:'#F59E0B' },
  { name:'Other',          pct:9,  amt:'₹2,300',  clr:'#8B5CF6' },
];

// ─── Shared micro-components ──────────────────────────────────────────────────
function StatusBar() {
  const t = useTheme();
  return (
    <div style={{
      height:44, padding:'0 20px', display:'flex', alignItems:'center',
      justifyContent:'space-between', fontFamily:t.mono,
      fontSize:12.5, fontWeight:600, color:t.ink, letterSpacing:'0.01em',
    }}>
      <span>9:41</span>
      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
        <svg width="15" height="10" viewBox="0 0 15 10"><g fill={t.ink}>
          <rect x="0" y="6" width="2.5" height="4" rx="0.5"/>
          <rect x="3.5" y="4" width="2.5" height="6" rx="0.5"/>
          <rect x="7" y="2" width="2.5" height="8" rx="0.5"/>
          <rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/>
        </g></svg>
        <svg width="22" height="11" viewBox="0 0 22 11">
          <rect x="0.5" y="0.5" width="19" height="10" rx="2.5" fill="none" stroke={t.ink} strokeOpacity="0.3"/>
          <rect x="2" y="2" width="14" height="7" rx="1.5" fill={t.ink}/>
          <rect x="20" y="3.5" width="1.8" height="4" rx="0.6" fill={t.ink} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function BottomNav({ active = 'home' }) {
  const t = useTheme();
  const tabs = [
    { id:'home',   label:'Home',     glyph:'⊞' },
    { id:'acct',   label:'Accounts', glyph:'◫' },
    { id:'add',    label:'',         glyph:'+', fab:true },
    { id:'budget', label:'Budget',   glyph:'◎' },
    { id:'report', label:'Reports',  glyph:'◈' },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, height:70,
      background:t.card, borderTop:`1px solid ${t.border}`,
      display:'flex', alignItems:'center', paddingBottom:4,
    }}>
      {tabs.map(tab => {
        const on = tab.id === active;
        if (tab.fab) return (
          <div key="fab" style={{ flex:1, display:'flex', justifyContent:'center' }}>
            <div style={{
              width:46, height:46, borderRadius:t.pill,
              background:t.accent, color:'#fff',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:22, fontWeight:300, marginTop:-14,
              boxShadow:`0 6px 20px ${t.accent}55`,
            }}>+</div>
          </div>
        );
        return (
          <div key={tab.id} style={{
            flex:1, display:'flex', flexDirection:'column',
            alignItems:'center', gap:3, paddingTop:10, cursor:'pointer',
          }}>
            <span style={{ fontSize:17, color: on ? t.accent : t.ink3 }}>{tab.glyph}</span>
            <span style={{
              fontSize:9.5, fontWeight: on ? 700 : 500,
              color: on ? t.accent : t.ink3, fontFamily:t.font, letterSpacing:'0.01em',
            }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ─── SCREEN 1 · Home ─────────────────────────────────────────────────────────
function HomeScreen() {
  const t = useTheme();
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      <div style={{ height:'calc(100% - 44px)', overflowY:'auto', paddingBottom:78 }}>

        {/* Hero card or plain header */}
        {t.hero ? (
          <div style={{ margin:'8px 14px 0', borderRadius:20, background:t.hero, padding:'20px 18px 22px', color:'#fff' }}>
            <div style={{ fontSize:10.5, fontWeight:600, opacity:0.65, letterSpacing:'0.12em', textTransform:'uppercase', fontFamily:t.mono }}>May 2026 · SpendWise</div>
            <div style={{ fontSize:38, fontWeight:700, letterSpacing:'-0.045em', marginTop:6, lineHeight:1, fontFamily:t.mono }}>₹12,450</div>
            <div style={{ fontSize:11.5, opacity:0.65, marginTop:3 }}>Net balance this month</div>
            <div style={{ display:'flex', gap:0, marginTop:16, borderTop:'1px solid rgba(255,255,255,0.18)', paddingTop:14 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:9.5, opacity:0.55, letterSpacing:'0.1em', fontFamily:t.mono }}>INCOME</div>
                <div style={{ fontSize:16, fontWeight:700, marginTop:2 }}>₹45,000</div>
              </div>
              <div style={{ width:1, background:'rgba(255,255,255,0.2)', margin:'0 16px' }}/>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:9.5, opacity:0.55, letterSpacing:'0.1em', fontFamily:t.mono }}>EXPENSE</div>
                <div style={{ fontSize:16, fontWeight:700, marginTop:2 }}>₹32,550</div>
              </div>
            </div>
          </div>
        ) : (
          <div style={{ padding:'4px 14px 0' }}>
            <div style={{ fontSize:10.5, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>May 2026</div>
            <div style={{ fontSize:12, color:t.ink2, marginTop:1 }}>Good morning, Smit</div>
            <div style={{ marginTop:10, borderRadius:18, background:t.card, border:`1px solid ${t.border}`, padding:'16px 16px' }}>
              <div style={{ fontSize:9.5, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.08em' }}>NET BALANCE</div>
              <div style={{ fontSize:36, fontWeight:700, color:t.ink, letterSpacing:'-0.045em', lineHeight:1, marginTop:4, fontFamily:t.mono }}>₹12,450</div>
              <div style={{ display:'flex', borderTop:`1px solid ${t.border}`, marginTop:12, paddingTop:10, gap:0 }}>
                <div style={{ flex:1, borderRight:`1px solid ${t.border}`, paddingRight:12 }}>
                  <div style={{ fontSize:9.5, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.08em' }}>INCOME</div>
                  <div style={{ fontSize:14, fontWeight:700, color:t.ok, marginTop:2, fontFamily:t.mono }}>₹45,000</div>
                </div>
                <div style={{ flex:1, paddingLeft:12 }}>
                  <div style={{ fontSize:9.5, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.08em' }}>EXPENSE</div>
                  <div style={{ fontSize:14, fontWeight:700, color:t.danger, marginTop:2, fontFamily:t.mono }}>₹32,550</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Budget progress */}
        <div style={{ margin:'10px 14px 0', padding:'12px 14px', borderRadius:13, background:t.card, border:`1px solid ${t.border}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontSize:12, fontWeight:600, color:t.ink }}>Budget · May</div>
            <div style={{ fontSize:10.5, color:t.ink3, fontFamily:t.mono }}>72% used</div>
          </div>
          <div style={{ marginTop:8, height:5, borderRadius:99, background:t.surface }}>
            <div style={{ width:'72%', height:'100%', borderRadius:99, background:t.accent }}/>
          </div>
          <div style={{ fontSize:10, color:t.ink3, marginTop:5 }}>₹32,550 of ₹45,000 · ₹12,450 left</div>
        </div>

        {/* Transactions */}
        <div style={{ padding:'14px 14px 0' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:9 }}>
            <div style={{ fontSize:13, fontWeight:700, color:t.ink }}>Recent</div>
            <div style={{ fontSize:11, color:t.accent, fontWeight:600 }}>View all</div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {TXNS.map(tx => (
              <div key={tx.id} style={{
                display:'flex', alignItems:'center', gap:10,
                padding:'9px 11px', borderRadius:11, background:t.card, border:`1px solid ${t.border}`,
              }}>
                <div style={{
                  width:34, height:34, borderRadius:9,
                  background:t.surface, display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, flexShrink:0,
                }}>{tx.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12.5, fontWeight:600, color:t.ink, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{tx.name}</div>
                  <div style={{ fontSize:10, color:t.ink3, marginTop:1 }}>{tx.cat} · {tx.date}</div>
                </div>
                <div style={{ fontSize:12.5, fontWeight:700, color:tx.neg ? t.danger : t.ok, fontFamily:t.mono, flexShrink:0 }}>
                  {tx.neg ? '−' : '+'}{tx.amt}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <BottomNav active="home"/>
    </div>
  );
}

// ─── SCREEN 2 · Add Transaction ───────────────────────────────────────────────
function AddScreen() {
  const t = useTheme();
  const [selCat, setSelCat] = useState('Food');
  const [txType, setTxType] = useState('expense');
  const cats = ['Food','Transport','Shopping','Bills','Health','Entertainment','Savings','Other'];
  const keys = ['1','2','3','4','5','6','7','8','9','.','0','⌫'];
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      {/* Header */}
      <div style={{ padding:'4px 14px 10px', display:'flex', alignItems:'center', gap:10 }}>
        <div style={{
          width:30, height:30, borderRadius:9, background:t.surface, border:`1px solid ${t.border}`,
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:t.ink2,
        }}>←</div>
        <div style={{ fontSize:15, fontWeight:700, color:t.ink }}>Add Transaction</div>
        <div style={{ marginLeft:'auto', display:'flex', borderRadius:99, background:t.surface, border:`1px solid ${t.border}`, overflow:'hidden' }}>
          {['expense','income'].map(type => (
            <button key={type} onClick={() => setTxType(type)} style={{
              padding:'5px 12px', border:'none', cursor:'pointer', fontFamily:t.font,
              fontSize:10.5, fontWeight:700, letterSpacing:'0.04em', textTransform:'capitalize',
              background: type === txType ? (type === 'income' ? t.ok : t.danger) : 'transparent',
              color: type === txType ? '#fff' : t.ink3,
              transition:'all 0.15s',
            }}>{type}</button>
          ))}
        </div>
      </div>
      {/* Amount display */}
      <div style={{ textAlign:'center', padding:'4px 14px 14px' }}>
        <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', marginBottom:6 }}>AMOUNT</div>
        <div style={{ fontSize:48, fontWeight:700, color:t.ink, letterSpacing:'-0.04em', lineHeight:1, fontFamily:t.mono }}>₹340</div>
        <div style={{ height:2, width:48, background:t.accent, borderRadius:99, margin:'8px auto 0' }}/>
      </div>
      {/* Category chips */}
      <div style={{ padding:'0 14px 10px' }}>
        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
          {cats.map(c => (
            <button key={c} onClick={() => setSelCat(c)} style={{
              height:26, padding:'0 11px', borderRadius:t.pill,
              background: c === selCat ? t.accent : t.surface,
              color: c === selCat ? '#fff' : t.ink2,
              border:`1px solid ${c === selCat ? t.accent : t.border}`,
              fontFamily:t.font, fontSize:10.5, fontWeight:600, cursor:'pointer',
            }}>{c}</button>
          ))}
        </div>
      </div>
      {/* Note field */}
      <div style={{ margin:'0 14px 10px', padding:'9px 12px', borderRadius:11, background:t.card, border:`1px solid ${t.border}`, display:'flex', gap:8, alignItems:'center' }}>
        <div style={{ fontSize:14 }}>📝</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:9.5, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.06em', marginBottom:2 }}>NOTE</div>
          <div style={{ fontSize:12, color:t.ink2 }}>Zomato — Lunch order</div>
        </div>
        <div style={{ fontSize:11, color:t.accent, fontWeight:600 }}>Edit</div>
      </div>
      {/* Keypad */}
      <div style={{ padding:'0 14px', display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:7 }}>
        {keys.map((k, i) => (
          <button key={i} style={{
            height:44, borderRadius:10,
            background: k === '⌫' ? t.accentBg : t.card,
            border:`1px solid ${t.border}`,
            color: k === '⌫' ? t.accent : t.ink,
            fontSize: k === '⌫' ? 17 : 18, fontWeight:600,
            fontFamily:t.mono, cursor:'pointer',
          }}>{k}</button>
        ))}
      </div>
      {/* Save */}
      <div style={{ padding:'10px 14px 0' }}>
        <button style={{
          width:'100%', height:46, borderRadius:t.pill,
          background:t.accent, color:'#fff', border:'none',
          fontSize:14, fontWeight:700, fontFamily:t.font, cursor:'pointer',
          boxShadow:`0 4px 14px ${t.accent}44`,
        }}>Save Transaction</button>
      </div>
    </div>
  );
}

// ─── SCREEN 3 · Budget ────────────────────────────────────────────────────────
function BudgetScreen() {
  const t = useTheme();
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      <div style={{ height:'calc(100% - 44px)', overflowY:'auto', paddingBottom:78 }}>
        {/* Header */}
        <div style={{ padding:'6px 14px 12px' }}>
          <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>Budget Overview</div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginTop:4 }}>
            <div style={{ fontSize:22, fontWeight:700, color:t.ink, letterSpacing:'-0.03em' }}>May 2026</div>
            <div style={{ fontSize:11, color:t.accent, fontWeight:600 }}>+ Set budget</div>
          </div>
        </div>
        {/* Summary card */}
        <div style={{ margin:'0 14px 12px', padding:'14px 16px', borderRadius:16, background:t.card, border:`1px solid ${t.border}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
            <div>
              <div style={{ fontSize:9.5, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.08em' }}>TOTAL SPENT</div>
              <div style={{ fontSize:26, fontWeight:700, color:t.ink, letterSpacing:'-0.04em', marginTop:3, fontFamily:t.mono }}>₹25,800</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:9.5, color:t.ink3, fontFamily:t.mono }}>of ₹45,000</div>
              <div style={{ fontSize:18, fontWeight:700, color:t.accent, fontFamily:t.mono }}>57%</div>
            </div>
          </div>
          <div style={{ marginTop:10, height:7, borderRadius:99, background:t.surface }}>
            <div style={{ width:'57%', height:'100%', borderRadius:99, background:t.accent }}/>
          </div>
          <div style={{ fontSize:10, color:t.ink3, marginTop:5 }}>₹19,200 remaining · 13 days left</div>
        </div>
        {/* Category rows */}
        <div style={{ padding:'0 14px', display:'flex', flexDirection:'column', gap:7 }}>
          {BUDGETS.map(b => {
            const pct = Math.round((b.spent / b.total) * 100);
            const over = pct >= 90;
            return (
              <div key={b.cat} style={{
                padding:'11px 13px', borderRadius:11,
                background:t.card, border:`1.5px solid ${over ? t.danger + '55' : t.border}`,
              }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                    <div style={{ width:8, height:8, borderRadius:2, background:b.clr, flexShrink:0 }}/>
                    <div style={{ fontSize:11.5, fontWeight:600, color:t.ink }}>{b.cat}</div>
                  </div>
                  <div style={{ fontSize:10.5, fontFamily:t.mono, fontWeight:600, color: over ? t.danger : t.ink3 }}>{pct}%</div>
                </div>
                <div style={{ marginTop:7, height:4, borderRadius:99, background:t.surface }}>
                  <div style={{ width:`${pct}%`, height:'100%', borderRadius:99, background: over ? t.danger : b.clr }}/>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', marginTop:4 }}>
                  <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono }}>₹{b.spent.toLocaleString('en-IN')}</div>
                  <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono }}>₹{b.total.toLocaleString('en-IN')}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <BottomNav active="budget"/>
    </div>
  );
}

// ─── SCREEN 4 · Reports ───────────────────────────────────────────────────────
function ReportsScreen() {
  const t = useTheme();
  const R = 50, CX = 68, CY = 68, circ = 2 * Math.PI * R;
  let acc = 0;
  const segs = REPORT_CATS.map(c => {
    const len = (c.pct / 100) * circ;
    const s = { ...c, offset: acc, len };
    acc += len;
    return s;
  });
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      <div style={{ height:'calc(100% - 44px)', overflowY:'auto', paddingBottom:78 }}>
        {/* Header */}
        <div style={{ padding:'6px 14px 10px' }}>
          <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>Spending Reports</div>
          <div style={{ fontSize:22, fontWeight:700, color:t.ink, letterSpacing:'-0.03em', marginTop:4 }}>May 2026</div>
        </div>
        {/* Month tabs */}
        <div style={{ padding:'0 14px 12px', display:'flex', gap:5 }}>
          {['Mar','Apr','May','Jun'].map((m, i) => (
            <div key={m} style={{
              height:25, padding:'0 11px', borderRadius:99,
              background: i === 2 ? t.accent : t.surface,
              color: i === 2 ? '#fff' : t.ink3,
              fontSize:11, fontWeight:600, display:'flex', alignItems:'center',
              border:`1px solid ${i === 2 ? t.accent : t.border}`,
            }}>{m}</div>
          ))}
        </div>
        {/* Donut + legend */}
        <div style={{ margin:'0 14px 12px', padding:'14px', borderRadius:16, background:t.card, border:`1px solid ${t.border}`, display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ position:'relative', flexShrink:0 }}>
            <svg width={136} height={136} viewBox="0 0 136 136">
              <circle cx={CX} cy={CY} r={R} fill="none" stroke={t.surface} strokeWidth={17}/>
              {segs.map((s, i) => (
                <circle key={i} cx={CX} cy={CY} r={R}
                  fill="none" stroke={s.clr} strokeWidth={17}
                  strokeDasharray={`${s.len} ${circ - s.len}`}
                  strokeDashoffset={circ / 4 - s.offset}
                  strokeLinecap="butt"
                />
              ))}
              <circle cx={CX} cy={CY} r={32} fill={t.card}/>
              <text x={CX} y={CY - 5} textAnchor="middle" fill={t.ink3} fontSize={9} fontFamily={t.mono}>SPENT</text>
              <text x={CX} y={CY + 10} textAnchor="middle" fill={t.ink} fontSize={12} fontWeight="700" fontFamily={t.mono}>₹25.8K</text>
            </svg>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:7, flex:1 }}>
            {REPORT_CATS.map(c => (
              <div key={c.name} style={{ display:'flex', alignItems:'center', gap:6 }}>
                <div style={{ width:7, height:7, borderRadius:2, background:c.clr, flexShrink:0 }}/>
                <div style={{ fontSize:10.5, color:t.ink2, flex:1, lineHeight:1.2 }}>{c.name}</div>
                <div style={{ fontSize:10.5, fontWeight:700, color:t.ink, fontFamily:t.mono }}>{c.pct}%</div>
              </div>
            ))}
          </div>
        </div>
        {/* Category list */}
        <div style={{ padding:'0 14px' }}>
          <div style={{ fontSize:12, fontWeight:700, color:t.ink, marginBottom:8 }}>By Category</div>
          {REPORT_CATS.map(c => (
            <div key={c.name} style={{
              display:'flex', alignItems:'center', gap:10, marginBottom:6,
              padding:'9px 11px', borderRadius:10, background:t.card, border:`1px solid ${t.border}`,
            }}>
              <div style={{ width:9, height:9, borderRadius:2.5, background:c.clr, flexShrink:0 }}/>
              <div style={{ flex:1, fontSize:11.5, color:t.ink }}>{c.name}</div>
              <div style={{ fontSize:11.5, fontWeight:700, color:t.ink, fontFamily:t.mono }}>{c.amt}</div>
              <div style={{ fontSize:10.5, color:t.ink3, fontFamily:t.mono, width:26, textAlign:'right' }}>{c.pct}%</div>
            </div>
          ))}
        </div>
      </div>
      <BottomNav active="report"/>
    </div>
  );
}

// ─── SCREEN 5 · Accounts ──────────────────────────────────────────────────────
function AccountsScreen() {
  const t = useTheme();
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      <div style={{ height:'calc(100% - 44px)', overflowY:'auto', paddingBottom:78 }}>
        <div style={{ padding:'6px 14px 10px', display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
          <div>
            <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>Accounts</div>
            <div style={{ fontSize:22, fontWeight:700, color:t.ink, letterSpacing:'-0.03em', marginTop:4 }}>My Wallets</div>
          </div>
          <div style={{ height:30, padding:'0 13px', borderRadius:99, background:t.accentBg, border:`1px solid ${t.accent}33`, display:'flex', alignItems:'center', fontSize:11, fontWeight:600, color:t.accent }}>+ Add</div>
        </div>
        {/* Total balance */}
        <div style={{
          margin:'0 14px 12px', borderRadius:18,
          background: t.hero || t.card, border: t.hero ? 'none' : `1px solid ${t.border}`,
          padding:'16px 18px',
        }}>
          <div style={{ fontSize:10, color: t.hero ? 'rgba(255,255,255,0.6)' : t.ink3, fontFamily:t.mono, letterSpacing:'0.08em' }}>TOTAL BALANCE</div>
          <div style={{ fontSize:32, fontWeight:700, color: t.hero ? '#fff' : t.ink, letterSpacing:'-0.04em', marginTop:4, lineHeight:1, fontFamily:t.mono }}>₹68,450</div>
          <div style={{ fontSize:11, color: t.hero ? 'rgba(255,255,255,0.55)' : t.ink3, marginTop:5 }}>Across 3 accounts · Updated now</div>
        </div>
        {/* Account cards */}
        <div style={{ padding:'0 14px', display:'flex', flexDirection:'column', gap:8 }}>
          {ACCOUNTS.map(acc => (
            <div key={acc.name} style={{ padding:'13px 14px', borderRadius:14, background:t.card, border:`1px solid ${t.border}`, display:'flex', alignItems:'center', gap:12 }}>
              <div style={{
                width:40, height:40, borderRadius:12, background:acc.bg,
                display:'flex', alignItems:'center', justifyContent:'center',
                color:'#fff', fontSize:14, fontWeight:700, flexShrink:0,
              }}>{acc.name[0]}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:t.ink }}>{acc.name}</div>
                <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, marginTop:1 }}>{acc.num || 'Physical cash'}</div>
              </div>
              <div style={{ fontSize:14, fontWeight:700, color:t.ink, fontFamily:t.mono }}>{acc.bal}</div>
            </div>
          ))}
        </div>
        {/* Recent transactions for this account */}
        <div style={{ padding:'14px 14px 0' }}>
          <div style={{ fontSize:12, fontWeight:700, color:t.ink, marginBottom:8 }}>Recent · HDFC Savings</div>
          {TXNS.slice(0, 3).map(tx => (
            <div key={tx.id} style={{
              display:'flex', alignItems:'center', gap:10, marginBottom:5,
              padding:'9px 11px', borderRadius:10, background:t.card, border:`1px solid ${t.border}`,
            }}>
              <div style={{ fontSize:15 }}>{tx.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11.5, fontWeight:600, color:t.ink }}>{tx.name}</div>
                <div style={{ fontSize:9.5, color:t.ink3 }}>{tx.date}</div>
              </div>
              <div style={{ fontSize:12, fontWeight:700, color:tx.neg ? t.danger : t.ok, fontFamily:t.mono }}>
                {tx.neg ? '−' : '+'}{tx.amt}
              </div>
            </div>
          ))}
        </div>
      </div>
      <BottomNav active="acct"/>
    </div>
  );
}

// ─── Phone shell ─────────────────────────────────────────────────────────────
const SW = 390, SH = 808, SC = 0.555;

function Phone({ children }) {
  return (
    <div className="phone-frame" style={{ width:SW * SC, height:SH * SC, flexShrink:0 }}>
      <div style={{ width:SW, height:SH, transform:`scale(${SC})`, transformOrigin:'top left' }}>
        {children}
      </div>
    </div>
  );
}

function PhoneCard({ label, num, children }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10, alignItems:'center' }}>
      <Phone>{children}</Phone>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:12, fontWeight:700, color:'#15130D', letterSpacing:'-0.01em' }}>{label}</div>
        <div style={{ fontSize:9.5, color:'#8A857A', fontFamily:'JetBrains Mono, monospace', marginTop:2, letterSpacing:'0.04em' }}>{num}</div>
      </div>
    </div>
  );
}

// ─── Theme section header ─────────────────────────────────────────────────────
function ThemeHeader({ theme }) {
  return (
    <div style={{ marginBottom:24 }}>
      <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
        <div>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'#8A857A', fontFamily:'JetBrains Mono, monospace' }}>UI Theme</div>
          <div style={{ fontSize:36, fontWeight:700, letterSpacing:'-0.04em', lineHeight:1.1, color:'#15130D', marginTop:5 }}>{theme.name}</div>
          <div style={{ fontSize:13, color:'#6A6560', marginTop:5, fontStyle:'italic' }}>{theme.tagline}</div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          {[
            { label:'Background', clr:theme.bg },
            { label:'Accent', clr:theme.accent },
            { label:'Income', clr:theme.ok },
            { label:'Expense', clr:theme.danger },
          ].map(sw => (
            <div key={sw.label} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
              <div style={{ width:32, height:32, borderRadius:9, background:sw.clr, border:'1.5px solid rgba(0,0,0,0.1)' }}/>
              <div style={{ fontSize:9, fontFamily:'JetBrains Mono, monospace', color:'#7A7570', letterSpacing:'0.04em' }}>{sw.label}</div>
            </div>
          ))}
          <div style={{ marginLeft:4, padding:'6px 12px', borderRadius:8, background:theme.bg, border:'1px solid rgba(0,0,0,0.1)' }}>
            <div style={{ fontSize:9.5, fontFamily:theme.font.split(',')[0].replace(/'/g,'') || 'sans-serif', fontWeight:600, color:theme.ink }}>Aa — {theme.font.split(',')[0].replace(/'/g,'')}</div>
            <div style={{ fontSize:9, fontFamily:theme.mono.split(',')[0].replace(/'/g,'') || 'monospace', color:theme.ink3, marginTop:2 }}>01234 mono</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Cover page ───────────────────────────────────────────────────────────────
function CoverPage() {
  const themeList = [THEMES.stripe, THEMES.paper, THEMES.coral, THEMES.minimal];
  return (
    <div className="page" style={{ minHeight:860 }}>
      <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:48 }}>
        <div style={{
          width:52, height:52, borderRadius:15, background:'#15130D', color:'#F0EDE5',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontWeight:800, fontSize:22, letterSpacing:'-0.04em',
          fontFamily:'Plus Jakarta Sans, sans-serif',
        }}>S</div>
        <div>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'#8A857A', fontFamily:'JetBrains Mono, monospace' }}>SpendWise · Android · v2.0 MVP</div>
          <div style={{ fontSize:16, fontWeight:700, letterSpacing:'-0.01em', marginTop:3, color:'#15130D' }}>Expense Tracker · UI Design Pack</div>
        </div>
      </div>
      <div style={{ fontSize:76, fontWeight:700, letterSpacing:'-0.045em', lineHeight:0.96, color:'#15130D' }}>
        4 Human-Designed<br/>
        <span style={{ color:'#8A857A' }}>Themes</span>
      </div>
      <div style={{ fontSize:16, color:'#4A4538', marginTop:28, lineHeight:1.6, maxWidth:620, fontWeight:500 }}>
        Every theme is purposefully designed — distinct typography, cohesive color language, and
        real-feeling screens for Home, Add Transaction, Budget, Reports, and Accounts.
        No gradients-on-everything. No purple-on-white. No AI defaults.
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginTop:52, maxWidth:760 }}>
        {themeList.map((theme, i) => (
          <div key={theme.id} style={{ padding:'18px 16px 16px', borderRadius:16, background:theme.bg, border:'1.5px solid rgba(0,0,0,0.1)' }}>
            <div style={{ fontSize:10, color:theme.ink3, fontFamily:theme.mono.split(',')[0].replace(/'/g,''), letterSpacing:'0.1em', marginBottom:8 }}>0{i+1}</div>
            <div style={{ width:36, height:36, borderRadius:10, background:theme.accent, marginBottom:12 }}/>
            <div style={{ fontSize:13, fontWeight:700, color:theme.ink, fontFamily:theme.font.split(',')[0].replace(/'/g,'') }}>{theme.name}</div>
            <div style={{ fontSize:9.5, color:theme.ink3, fontFamily:theme.mono.split(',')[0].replace(/'/g,''), marginTop:5, letterSpacing:'0.04em' }}>{theme.accent}</div>
          </div>
        ))}
      </div>
      <div style={{
        marginTop:56, display:'flex', justifyContent:'space-between',
        fontSize:10, fontFamily:'JetBrains Mono, monospace', color:'#8A857A',
        letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:600,
      }}>
        <span>Instrument Sans · Plus Jakarta Sans · DM Sans</span>
        <span>4 themes · 5 screens each · 20 mockups</span>
        <span>May 2026</span>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const themeList = [THEMES.stripe, THEMES.paper, THEMES.coral, THEMES.minimal];
  return (
    <div style={{ background:'#EDEAE3', minHeight:'100vh', paddingBottom:60 }}>
      <CoverPage/>
      <hr className="divider"/>
      {themeList.map((theme, ti) => (
        <ThemeCtx.Provider key={theme.id} value={theme}>
          <div className="page">
            <ThemeHeader theme={theme}/>
            <div className="phone-row">
              <PhoneCard label="Home · Dashboard" num={`${String(ti*5+1).padStart(2,'0')}`}><HomeScreen/></PhoneCard>
              <PhoneCard label="Add Transaction" num={`${String(ti*5+2).padStart(2,'0')}`}><AddScreen/></PhoneCard>
              <PhoneCard label="Budget Overview" num={`${String(ti*5+3).padStart(2,'0')}`}><BudgetScreen/></PhoneCard>
              <PhoneCard label="Spending Reports" num={`${String(ti*5+4).padStart(2,'0')}`}><ReportsScreen/></PhoneCard>
              <PhoneCard label="Accounts & Wallets" num={`${String(ti*5+5).padStart(2,'0')}`}><AccountsScreen/></PhoneCard>
            </div>
          </div>
          {ti < themeList.length - 1 && <hr className="divider"/>}
        </ThemeCtx.Provider>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
