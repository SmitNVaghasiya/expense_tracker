<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  .divider { border:none; border-top:1px solid #1E2D5A; margin:0 48px; }
</style>
</head>
<body>
<div id="root"></div>

const ThemeCtx = createContext(null);
const useTheme = () => useContext(ThemeCtx);

  hero: 'linear-gradient(138deg,#533AFD 0%,#7C3AED 55%,#0EA5E9 100%)',

  { cat:'Shopping',       spent:6800,  total:8000,  clr:'#FBBF24' },
  { cat:'Bills & Utils',  spent:5100,  total:6000,  clr:'#10B981' },
  { cat:'Entertainment',  spent:2300,  total:4000,  clr:'#A78BFA' },
];
const ACCOUNTS = [
  { name:'HDFC Savings', num:'••4521', bal:'₹45,200', bg:'#1A56DB' },
  { name:'SBI Current',  num:'••7803', bal:'₹18,750', bg:'#0891B2' },
  { name:'Cash Wallet',  num:'',       bal:'₹4,500',  bg:'#059669' },

  { name:'Rahul Shah',     type:'personal', dir:'lent',    amt:'₹8,000',     date:'12 Apr', status:'active', note:'For bike repair' },
  { name:'Mom',            type:'personal', dir:'borrowed', amt:'₹15,000',    date:'02 Mar', status:'active', note:'Emergency expense' },
  { name:'HDFC Home Loan', type:'bank',     dir:'borrowed', amt:'₹24,00,000', emi:'₹19,840', status:'active', paid:18, total:240 },
];
const GOALS = [
  { name:'Emergency Fund', target:100000, saved:68000, deadline:'Dec 2026', icon:'🛡️', pct:68 },
  { name:'Goa Trip',       target:25000,  saved:12500, deadline:'Aug 2026', icon:'✈️',  pct:50 },
  { name:'New Laptop',     target:80000,  saved:30000, deadline:'Mar 2027', icon:'💻',  pct:38 },
];
const REPORT_CATS = [
  { name:'Food & Dining', pct:32, amt:'₹8,200', clr:'#F87171' },
  { name:'Shopping',      pct:26, amt:'₹6,800', clr:'#7B6FFF' },
  { name:'Bills',         pct:20, amt:'₹5,100', clr:'#10B981' },

  { name:'Other',         pct:9,  amt:'₹2,300', clr:'#A78BFA' },

// ── Shared components ──────────────────────────────────────────────────────────
function StatusBar({ light }) {
  const t = useTheme();
  const col = light ? 'rgba(255,255,255,0.9)' : t.ink;
  return (
    <div style={{
      height:44, padding:'0 20px', display:'flex', alignItems:'center',
      justifyContent:'space-between', fontFamily:t.mono,
      fontSize:12.5, fontWeight:600, color:col, letterSpacing:'0.01em',
    }}>
      <span>9:41</span>
      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
        <svg width="15" height="10" viewBox="0 0 15 10"><g fill={col}>
          <rect x="0" y="6" width="2.5" height="4" rx="0.5"/>
          <rect x="3.5" y="4" width="2.5" height="6" rx="0.5"/>
          <rect x="7" y="2" width="2.5" height="8" rx="0.5"/>
          <rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/>
        </g></svg>
        <svg width="22" height="11" viewBox="0 0 22 11">
          <rect x="0.5" y="0.5" width="19" height="10" rx="2.5" fill="none" stroke={col} strokeOpacity="0.35"/>
          <rect x="2" y="2" width="14" height="7" rx="1.5" fill={col}/>
          <rect x="20" y="3.5" width="1.8" height="4" rx="0.6" fill={col} fillOpacity="0.35"/>
        </svg>
      </div>
    </div>
  );
}

function BottomNav({ active }) {
  const t = useTheme();
  const tabs = [
    { id:'home',    label:'Home',    icon:'⊞' },
    { id:'records', label:'Records', icon:'☰' },
    { id:'add',     label:'',        icon:'+', fab:true },
    { id:'finance', label:'Finance', icon:'◎' },
    { id:'reports', label:'Reports', icon:'◈' },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, height:72,
      background:t.card, borderTop:`1px solid ${t.border}`,
      display:'flex', alignItems:'center', paddingBottom:6,
    }}>
      {tabs.map(tab => {
        const on = tab.id === active;
        if (tab.fab) return (
          <div key="fab" style={{ flex:1, display:'flex', justifyContent:'center' }}>
            <div style={{
              width:48, height:48, borderRadius:t.pill,
              background:t.accent, color:'#fff',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:24, fontWeight:300, marginTop:-16,
              boxShadow:`0 6px 20px ${t.accent}55`,
            }}>+</div>
          </div>
        );
        return (
          <div key={tab.id} style={{
            flex:1, display:'flex', flexDirection:'column',
            alignItems:'center', gap:2, paddingTop:10,
          }}>
            <span style={{ fontSize:16, color: on ? t.accent : t.ink3 }}>{tab.icon}</span>
            <span style={{
              fontSize:9, fontWeight: on ? 700 : 500,
              color: on ? t.accent : t.ink3, fontFamily:t.font, letterSpacing:'0.01em',
            }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function Badge({ children, color, bg }) {
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', padding:'2px 7px',
      borderRadius:99, background:bg, color:color,
      fontSize:9, fontWeight:700, letterSpacing:'0.04em',
    }}>{children}</span>
  );
}

// ── SCREEN 1 · Home ────────────────────────────────────────────────────────────
function HomeScreen() {
  const t = useTheme();
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <div style={{ background:t.hero, paddingBottom:0 }}>
        <StatusBar light/>
        <div style={{ padding:'4px 18px 20px', color:'#fff' }}>
          <div style={{ fontSize:10, fontWeight:600, opacity:0.6, letterSpacing:'0.12em', textTransform:'uppercase', fontFamily:t.mono }}>May 2026 · SpendWise</div>
          <div style={{ fontSize:10.5, opacity:0.7, marginTop:2 }}>Good morning, Smit 👋</div>
          <div style={{ fontSize:40, fontWeight:700, letterSpacing:'-0.045em', marginTop:4, lineHeight:1, fontFamily:t.mono }}>₹12,450</div>

            </div>
            <div style={{ width:1, background:'rgba(255,255,255,0.2)', margin:'0 14px' }}/>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:9, opacity:0.55, letterSpacing:'0.1em', fontFamily:t.mono }}>EXPENSE</div>
              <div style={{ fontSize:15, fontWeight:700, marginTop:1, fontFamily:t.mono }}>₹32,550</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{ height:'calc(100% - 44px - 130px)', overflowY:'auto', paddingBottom:78, background:t.bg }}>
        <div style={{ margin:'12px 14px 0', padding:'12px 14px', borderRadius:13, background:t.card, border:`1px solid ${t.border}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontSize:12, fontWeight:600, color:t.ink }}>Budget · May</div>
            <div style={{ fontSize:10, color:t.accent, fontFamily:t.mono, fontWeight:600 }}>72% used</div>
          </div>
          <div style={{ marginTop:8, height:5, borderRadius:99, background:t.surface }}>
            <div style={{ width:'72%', height:'100%', borderRadius:99, background:t.accent }}/>
          </div>
          <div style={{ fontSize:9.5, color:t.ink3, marginTop:5 }}>₹32,550 of ₹45,000 · ₹12,450 left</div>
        </div>
        <div style={{ padding:'14px 14px 0' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:9 }}>
            <div style={{ fontSize:12.5, fontWeight:700, color:t.ink }}>Recent</div>
            <div style={{ fontSize:11, color:t.accent, fontWeight:600 }}>View all</div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {TXNS.map(tx => (
              <div key={tx.id} style={{
                display:'flex', alignItems:'center', gap:10,

                }}>{tx.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:t.ink, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{tx.name}</div>
                  <div style={{ fontSize:9.5, color:t.ink3, marginTop:1 }}>{tx.cat} · {tx.date}</div>
                </div>
                <div style={{ fontSize:12, fontWeight:700, color:tx.neg ? t.danger : t.ok, fontFamily:t.mono, flexShrink:0 }}>

        <div style={{ marginTop:10, padding:'0 10px', height:33, borderRadius:10, background:t.surface, border:`1px solid ${t.border}`, display:'flex', alignItems:'center', gap:7 }}>

              height:26, padding:'0 12px', borderRadius:t.pill,

function AddScreen() {

        }}>←</div>
        <div style={{ fontSize:15, fontWeight:700, color:t.ink }}>Add Transaction</div>
        <div style={{ marginLeft:'auto', display:'flex', borderRadius:t.pill, background:t.surface, border:`1px solid ${t.border}`, overflow:'hidden' }}>
          {['Expense','Income'].map((type, i) => (
            <div key={type} style={{
              padding:'5px 11px', fontSize:10.5, fontWeight:700,

      <div style={{ textAlign:'center', padding:'2px 14px 10px' }}>

        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>

              border:`1px solid ${i === 0 ? t.accent : t.border}`,
              fontSize:10, fontWeight:600, display:'flex', alignItems:'center',

      </div>
      <div style={{ margin:'0 14px 8px', padding:'8px 12px', borderRadius:10, background:t.card, border:`1px solid ${t.border}`, display:'flex', gap:8, alignItems:'center' }}>
        <span style={{ fontSize:13 }}>📝</span>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:9, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.06em', marginBottom:1 }}>NOTE</div>
          <div style={{ fontSize:11.5, color:t.ink2 }}>Zomato lunch order</div>
        </div>
      </div>
      <div style={{ padding:'0 14px', display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6 }}>
        {keys.map((k, i) => (
          <div key={i} style={{
            height:44, borderRadius:10,
