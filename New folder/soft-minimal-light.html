<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SpendWise · Soft Minimal · Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#FAFAF9; font-family:'Plus Jakarta Sans',system-ui,sans-serif; }
  .page { width:1260px; margin:0 auto; padding:64px 48px 72px; }
  .phone-row { display:flex; gap:28px; flex-wrap:wrap; margin-top:32px; }
  .phone-frame { border-radius:40px; overflow:hidden; box-shadow:0 0 0 1px #E4E4DE, 0 20px 56px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04); flex-shrink:0; position:relative; }
  .divider { border:none; border-top:1px solid #E4E4DE; }
  @media print { body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useContext, createContext } = React;

const ThemeCtx = createContext(null);
const useTheme = () => useContext(ThemeCtx);

const T = {
  bg: '#FAFAF9', surface: '#F2F2F0', card: '#FFFFFF', border: '#E4E4DE',
  ink: '#1C1C1A', ink2: '#6B6B64', ink3: '#ACACAA',
  accent: '#18181B', accentBg: '#F0F0EE',
  ok: '#15803D', okBg: '#F0FDF4',
  danger: '#DC2626', dangerBg: '#FEF2F2',
  warn: '#D97706', warnBg: '#FFFBEB',
  hero: null, heroText: '#1C1C1A',
  font: "'Plus Jakarta Sans', system-ui, sans-serif",
  mono: "'IBM Plex Mono', monospace",
  pill: 8,
  name: 'Soft Minimal · Light',
};

const TXNS = [
  { id:1, name:'Zomato Order',   cat:'Food',      amt:'₹340',    neg:true,  icon:'🍕', date:'Today'     },
  { id:2, name:'Salary Credit',  cat:'Income',    amt:'₹45,000', neg:false, icon:'💼', date:'Today'     },
  { id:3, name:'Auto Rickshaw',  cat:'Transport', amt:'₹120',    neg:true,  icon:'🛺', date:'Yesterday' },
  { id:4, name:'D-Mart Grocery', cat:'Shopping',  amt:'₹1,840',  neg:true,  icon:'🛒', date:'Yesterday' },
  { id:5, name:'Jio Recharge',   cat:'Bills',     amt:'₹399',    neg:true,  icon:'📱', date:'18 May'    },
];

const BUDGETS = [
  { cat:'Food & Dining',   spent:8200,  total:12000, clr:'#DC2626' },
  { cat:'Transport',       spent:3400,  total:5000,  clr:'#2563EB' },
  { cat:'Shopping',        spent:6800,  total:8000,  clr:'#D97706' },
  { cat:'Bills & Utils',   spent:5100,  total:6000,  clr:'#15803D' },
  { cat:'Entertainment',   spent:2300,  total:4000,  clr:'#7C3AED' },
];

const ACCOUNTS = [
  { name:'HDFC Savings', num:'••4521', bal:'₹45,200', bg:'#1D4ED8' },
  { name:'SBI Current',  num:'••7803', bal:'₹18,750', bg:'#0E7490' },
  { name:'Cash Wallet',  num:'',       bal:'₹4,500',  bg:'#15803D' },
];

const LOANS = [
  { name:'Rahul Shah',     type:'personal', dir:'lent',     amt:'₹8,000',     date:'12 Apr', status:'active', note:'For bike repair' },
  { name:'Mom',            type:'personal', dir:'borrowed', amt:'₹15,000',    date:'02 Mar', status:'active', note:'Emergency expense' },
  { name:'HDFC Home Loan', type:'bank',     dir:'borrowed', amt:'₹24,00,000', emi:'₹19,840', status:'active', paid:18, total:240 },
];

const GOALS = [
  { name:'Emergency Fund', target:100000, saved:68000, deadline:'Dec 2026', icon:'🛡️' },
  { name:'Goa Trip',        target:25000,  saved:12500, deadline:'Aug 2026', icon:'✈️' },
  { name:'New Laptop',      target:80000,  saved:30000, deadline:'Mar 2027', icon:'💻' },
];

const REPORT_CATS = [
  { name:'Food & Dining', pct:32, amt:'₹8,200', clr:'#DC2626' },
  { name:'Shopping',      pct:26, amt:'₹6,800', clr:'#2563EB' },
  { name:'Bills',         pct:20, amt:'₹5,100', clr:'#15803D' },
  { name:'Transport',     pct:13, amt:'₹3,400', clr:'#D97706' },
  { name:'Other',         pct:9,  amt:'₹2,300', clr:'#7C3AED' },
];

// ─── StatusBar ────────────────────────────────────────────────────────────────
function StatusBar() {
  const t = useTheme();
  return (
    <div style={{
      height:44, padding:'0 20px', display:'flex', alignItems:'center',
      justifyContent:'space-between', fontFamily:t.mono,
      fontSize:12.5, fontWeight:600, color:t.ink, letterSpacing:'0.01em',
      background:t.bg,
    }}>
      <span>9:41</span>
      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
        <svg width="15" height="10" viewBox="0 0 15 10"><g fill={t.ink}>
          <rect x="0" y="6" width="2.5" height="4" rx="0.5"/>
          <rect x="3.5" y="4" width="2.5" height="6" rx="0.5"/>
          <rect x="7" y="2" width="2.5" height="8" rx="0.5"/>
          <rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/>
        </g></svg>
        <svg width="22" height="11" viewBox="0 0 22 11">
          <rect x="0.5" y="0.5" width="19" height="10" rx="2.5" fill="none" stroke={t.ink} strokeOpacity="0.3"/>
          <rect x="2" y="2" width="14" height="7" rx="1.5" fill={t.ink}/>
          <rect x="20" y="3.5" width="1.8" height="4" rx="0.6" fill={t.ink} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─── BottomNav ────────────────────────────────────────────────────────────────
function BottomNav({ active }) {
  const t = useTheme();
  const tabs = [
    { id:'home',    label:'Home',     icon:'⊞' },
    { id:'records', label:'Records',  icon:'◧' },
    { id:'add',     label:'',         icon:'+', fab:true },
    { id:'finance', label:'Finance',  icon:'◫' },
    { id:'reports', label:'Reports',  icon:'◈' },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, height:72,
      background:t.card, borderTop:`1px solid ${t.border}`,
      display:'flex', alignItems:'center', paddingBottom:6,
    }}>
      {tabs.map(tab => {
        const on = tab.id === active;
        if (tab.fab) return (
          <div key="fab" style={{ flex:1, display:'flex', justifyContent:'center' }}>
            <div style={{
              width:44, height:44, borderRadius:t.pill + 4,
              background:t.accent, color:'#fff',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:22, fontWeight:300, marginTop:-16,
              boxShadow:`0 4px 16px rgba(24,24,27,0.25)`,
            }}>+</div>
          </div>
        );
        return (
          <div key={tab.id} style={{
            flex:1, display:'flex', flexDirection:'column',
            alignItems:'center', gap:3, paddingTop:10,
          }}>
            {on ? (
              <div style={{
                padding:'2px 10px', borderRadius:t.pill,
                background:t.accent,
                display:'flex', flexDirection:'column', alignItems:'center', gap:2,
              }}>
                <span style={{ fontSize:15, color:'#fff' }}>{tab.icon}</span>
                <span style={{ fontSize:9, fontWeight:700, color:'#fff', fontFamily:t.font, letterSpacing:'0.02em' }}>{tab.label}</span>
              </div>
            ) : (
              <>
                <span style={{ fontSize:15, color:t.ink3 }}>{tab.icon}</span>
                <span style={{ fontSize:9, fontWeight:500, color:t.ink3, fontFamily:t.font, letterSpacing:'0.02em' }}>{tab.label}</span>
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SCREEN 1 · Home Dashboard ────────────────────────────────────────────────
function HomeScreen() {
  const t = useTheme();
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      <div style={{ height:'calc(100% - 44px)', overflowY:'auto', paddingBottom:80 }}>
        <div style={{ padding:'8px 16px 0' }}>
          <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.12em', textTransform:'uppercase' }}>May 2026</div>
          <div style={{ fontSize:13, color:t.ink2, marginTop:2, fontWeight:500 }}>Good morning, Smit</div>
        </div>

        {/* Balance card */}
        <div style={{ margin:'12px 16px 0', borderRadius:16, background:t.card, border:`1px solid ${t.border}`, padding:'18px 18px 16px' }}>
          <div style={{ fontSize:9.5, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>Net Balance</div>
          <div style={{ fontSize:38, fontWeight:600, color:t.ink, letterSpacing:'-0.045em', lineHeight:1, marginTop:6, fontFamily:t.mono }}>₹12,450</div>
          <div style={{ display:'flex', borderTop:`1px solid ${t.border}`, marginTop:14, paddingTop:12, gap:0 }}>
            <div style={{ flex:1, borderRight:`1px solid ${t.border}`, paddingRight:14 }}>
              <div style={{ fontSize:9, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>Income</div>
              <div style={{ fontSize:15, fontWeight:600, color:t.ok, marginTop:3, fontFamily:t.mono }}>₹45,000</div>
            </div>
            <div style={{ flex:1, paddingLeft:14 }}>
              <div style={{ fontSize:9, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>Expense</div>
              <div style={{ fontSize:15, fontWeight:600, color:t.danger, marginTop:3, fontFamily:t.mono }}>₹32,550</div>
            </div>
          </div>
        </div>

        {/* Budget bar */}
        <div style={{ margin:'10px 16px 0', padding:'13px 14px', borderRadius:12, background:t.card, border:`1px solid ${t.border}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
            <div style={{ fontSize:12, fontWeight:600, color:t.ink }}>Budget · May</div>
            <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono }}>72%</div>
          </div>
          <div style={{ height:4, borderRadius:99, background:t.surface }}>
            <div style={{ width:'72%', height:'100%', borderRadius:99, background:t.accent }}/>
          </div>
          <div style={{ fontSize:9.5, color:t.ink3, marginTop:6, fontFamily:t.mono }}>₹32,550 spent · ₹12,450 left</div>
        </div>

        {/* Recent transactions */}
        <div style={{ padding:'14px 16px 0' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:t.ink }}>Recent</div>
            <div style={{ fontSize:10.5, color:t.accent, fontWeight:600 }}>View all</div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
            {TXNS.map(tx => (
              <div key={tx.id} style={{
                display:'flex', alignItems:'center', gap:10,
                padding:'9px 11px', borderRadius:10, background:t.card, border:`1px solid ${t.border}`,
              }}>
                <div style={{
                  width:34, height:34, borderRadius:8,
                  background:t.surface, display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, flexShrink:0,
                }}>{tx.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:t.ink, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{tx.name}</div>
                  <div style={{ fontSize:9.5, color:t.ink3, marginTop:1 }}>{tx.cat} · {tx.date}</div>
                </div>
                <div style={{ fontSize:12, fontWeight:600, color: tx.neg ? t.danger : t.ok, fontFamily:t.mono, flexShrink:0 }}>
                  {tx.neg ? '−' : '+'}{tx.amt}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <BottomNav active="home"/>
    </div>
  );
}

// ─── SCREEN 2 · Records ───────────────────────────────────────────────────────
function RecordsScreen() {
  const t = useTheme();
  const groups = [
    { label:'Today', txns: TXNS.filter(x => x.date === 'Today') },
    { label:'Yesterday', txns: TXNS.filter(x => x.date === 'Yesterday') },
    { label:'18 May', txns: TXNS.filter(x => x.date === '18 May') },
  ];
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      <div style={{ height:'calc(100% - 44px)', overflowY:'auto', paddingBottom:80 }}>
        <div style={{ padding:'8px 16px 4px' }}>
          <div style={{ fontSize:22, fontWeight:700, color:t.ink, letterSpacing:'-0.03em' }}>Records</div>
          <div style={{ fontSize:11, color:t.ink3, fontFamily:t.mono, marginTop:2 }}>May 2026</div>
        </div>

        {/* Search */}
        <div style={{ margin:'10px 16px 0', padding:'9px 12px', borderRadius:10, background:t.card, border:`1px solid ${t.border}`, display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ color:t.ink3, fontSize:14 }}>🔍</span>
          <span style={{ fontSize:12, color:t.ink3, fontFamily:t.font }}>Search transactions...</span>
        </div>

        {/* Tabs */}
        <div style={{ padding:'10px 16px 0', display:'flex', gap:0, borderBottom:`1px solid ${t.border}`, marginBottom:4 }}>
          {['All','Expenses','Income'].map((tab, i) => (
            <div key={tab} style={{
              padding:'6px 14px', fontSize:11.5, fontWeight: i === 0 ? 700 : 500,
              color: i === 0 ? t.ink : t.ink3,
              borderBottom: i === 0 ? `2px solid ${t.accent}` : '2px solid transparent',
              marginBottom:-1,
            }}>{tab}</div>
          ))}
        </div>

        {/* Transaction groups */}
        {groups.filter(g => g.txns.length > 0).map(group => (
          <div key={group.label} style={{ padding:'12px 16px 0' }}>
            <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:8 }}>{group.label}</div>
            <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
              {group.txns.map(tx => (
                <div key={tx.id} style={{
                  display:'flex', alignItems:'center', gap:10,
                  padding:'10px 11px', borderRadius:10, background:t.card, border:`1px solid ${t.border}`,
                }}>
                  <div style={{
                    width:36, height:36, borderRadius:8,
                    background:t.surface, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0,
                  }}>{tx.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12.5, fontWeight:600, color:t.ink }}>{tx.name}</div>
                    <div style={{ fontSize:9.5, color:t.ink3, marginTop:1, fontFamily:t.mono }}>{tx.cat}</div>
                  </div>
                  <div style={{ textAlign:'right', flexShrink:0 }}>
                    <div style={{ fontSize:12.5, fontWeight:600, color: tx.neg ? t.danger : t.ok, fontFamily:t.mono }}>
                      {tx.neg ? '−' : '+'}{tx.amt}
                    </div>
                    <div style={{ fontSize:9, color:t.ink3, marginTop:1, fontFamily:t.mono }}>{tx.date}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <BottomNav active="records"/>
    </div>
  );
}

// ─── SCREEN 3 · Add Transaction ───────────────────────────────────────────────
function AddScreen() {
  const t = useTheme();
  const cats = ['Food','Transport','Shopping','Bills','Health','Entertainment','Savings','Other'];
  const keys = ['1','2','3','4','5','6','7','8','9','.','0','⌫'];
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>
      <StatusBar/>
      {/* Header */}
      <div style={{ padding:'6px 16px 10px', display:'flex', alignItems:'center', gap:10 }}>
        <div style={{
          width:30, height:30, borderRadius:8, background:t.surface, border:`1px solid ${t.border}`,
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:t.ink2,
        }}>←</div>
        <div style={{ fontSize:15, fontWeight:700, color:t.ink }}>Add Transaction</div>
        <div style={{ marginLeft:'auto', display:'flex', borderRadius:t.pill, background:t.surface, border:`1px solid ${t.border}`, overflow:'hidden' }}>
          {['Expense','Income'].map((type, i) => (
            <div key={type} style={{
              padding:'5px 12px', fontSize:10.5, fontWeight:600, letterSpacing:'0.02em',
              background: i === 0 ? t.danger : 'transparent',
              color: i === 0 ? '#fff' : t.ink3,
            }}>{type}</div>
          ))}
        </div>
      </div>

      {/* Expression + Amount */}
      <div style={{ textAlign:'center', padding:'4px 16px 12px' }}>
        <div style={{ fontSize:10, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.08em', marginBottom:4 }}>200 + 140</div>
        <div style={{ fontSize:48, fontWeight:600, color:t.ink, letterSpacing:'-0.045em', lineHeight:1, fontFamily:t.mono }}>₹340</div>
        <div style={{ height:2, width:3, background:t.accent, borderRadius:99, margin:'7px auto 0', animation:'blink 1s infinite' }}/>
      </div>

      {/* Category chips */}
      <div style={{ padding:'0 16px 10px' }}>
        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
          {cats.map((c, i) => (
            <div key={c} style={{
              height:26, padding:'0 11px', borderRadius:t.pill,
              background: i === 0 ? t.accent : t.surface,
              color: i === 0 ? '#fff' : t.ink2,
              border:`1px solid ${i === 0 ? t.accent : t.border}`,
              fontSize:10.5, fontWeight:600, display:'flex', alignItems:'center',
            }}>{c}</div>
          ))}
        </div>
      </div>

      {/* Note */}
      <div style={{ margin:'0 16px 10px', padding:'9px 12px', borderRadius:10, background:t.card, border:`1px solid ${t.border}`, display:'flex', gap:8, alignItems:'center' }}>
        <span style={{ fontSize:14 }}>📝</span>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:9, color:t.ink3, fontFamily:t.mono, letterSpacing:'0.08em', marginBottom:2, textTransform:'uppercase' }}>Note</div>
          <div style={{ fontSize:12, color:t.ink2 }}>Zomato lunch order</div>
        </div>
      </div>

      {/* Keypad */}
      <div style={{ padding:'0 16px', display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6 }}>
        {keys.map((k, i) => (
          <div key={i} style={{
            height:42, borderRadius:8,
            background: k === '⌫' ? t.accentBg : t.card,
            border:`1px solid ${t.border}`,
            color: k === '⌫' ? t.accent : t.ink,
            fontSize: k === '⌫' ? 16 : 17, fontWeight:600,
            fontFamily:t.mono, display:'flex', alignItems:'center', justifyContent:'center',
          }}>{k}</div>
        ))}
      </div>

      {/* Save */}
      <div style={{ padding:'10px 16px 0' }}>
        <div style={{
          width:'100%', height:46, borderRadius:t.pill,
          background:t.accent, color:'#fff', border:'none',
          fontSize:13, fontWeight:700, fontFamily:t.font,
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>Save Transaction</div>
      </div>
    </div>
  );
}

// ─── SCREEN 4 · Accounts ──────────────────────────────────────────────────────
function AccountsScreen() {
  const t = useTheme();
  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, position:'relative', fontFamily:t.font, overflow:'hidden' }}>

        <div style={{ padding:'8px 16px 10px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>

            <div style={{ fontSize:22, fontWeight:700, color:t.ink, letterSpacing:'-0.03em' }}>Accounts</div>
            <div style={{ fontSize:11, color:t.ink3, fontFamily:t.mono, marginTop:2 }}>3 accounts linked</div>
          </div>
          <div style={{ padding:'5px 12px', borderRadius:t.pill, background:t.surface, border:`1px solid ${t.border}`, fontSize:11.5, fontWeight:600, color:t.ink2 }}>Add +</div>

          <div style={{ fontSize:10, color:t.ink3, marginTop:6, fontFamily:t.mono }}>Across 3 accounts · Updated now</div>

        <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:0, borderRadius:12, overflow:'hidden', border:`1px solid ${t.border}`, margin:'0 16px' }}>

    { label:'Group Spending',     num:'11', el:<GroupsScreen/> },

  // Split into rows of 4
  const rows = [];
  for (let i = 0; i < screens.length; i += 4) {

  return (
    <ThemeCtx.Provider value={T}>

        <CoverPage/>
        <hr className="divider"/>
        {rows.map((row, ri) => (

            <div className="phone-row">
              {row.map(s => (
                <PhoneCard key={s.num} label={s.label} num={s.num}>{s.el}</PhoneCard>
              ))}
            </div>

      </div>
    </ThemeCtx.Provider>
  );
}
