// ── StatusBar ─────────────────────────────────────────────────────────────────
function StatusBar() {
  const t = useTheme();

    <div style={{
      height:44, padding:'0 20px', display:'flex', alignItems:'center',
      justifyContent:'space-between', fontFamily:t.mono,
      fontSize:12.5, fontWeight:600, color:t.ink, letterSpacing:'0.01em',

      <span>9:41</span>
      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
        <svg width="15" height="10" viewBox="0 0 15 10"><g fill={t.ink}>

          <rect x="3.5" y="4" width="2.5" height="6" rx="0.5"/>
          <rect x="7" y="2" width="2.5" height="8" rx="0.5"/>

// ── BottomNav ─────────────────────────────────────────────────────────────────
function BottomNav({ active='home' }) {
  const t = useTheme();
  const tabs = [
    { id:'home',    label:'Home',    glyph:'⊞' },
    { id:'records', label:'Records', glyph:'☰' },
    { id:'add',     label:'',        glyph:'+', fab:true },
    { id:'finance', label:'Finance', glyph:'◎' },
    { id:'reports', label:'Reports', glyph:'◈' },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, height:70,
      background:t.card, borderTop:`1px solid ${t.border}`,
      display:'flex', alignItems:'center', paddingBottom:4,
    }}>
      {tabs.map(tab => {
        const on = tab.id === active;
        if (tab.fab) return (
          <div key="fab" style={{ flex:1, display:'flex', justifyContent:'center' }}>
            <div style={{
              width:46, height:46, borderRadius:t.pill,
              background:t.accent, color:'#fff',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:22, fontWeight:300, marginTop:-14,
            }}>+</div>
          </div>
        );
        return (
          <div key={tab.id} style={{
            flex:1, display:'flex', flexDirection:'column',
            alignItems:'center', gap:3, paddingTop:10,
          }}>
            <span style={{ fontSize:17, color: on ? t.accent : t.ink3 }}>{tab.glyph}</span>
            <span style={{ fontSize:9.5, fontWeight: on ? 700 : 500, color: on ? t.accent : t.ink3, fontFamily:t.font, letterSpacing:'0.01em' }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}
