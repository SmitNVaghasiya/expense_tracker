<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>SpendWise — 15 UI Style Previews</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,300;0,400;0,700;1,300;1,700&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#1a1a1a;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#111}
  ::-webkit-scrollbar-thumb{background:#444;border-radius:3px}

  .page-header{
    padding:56px 64px 40px;
    border-bottom:1px solid #2a2a2a;
    margin-bottom:56px;
  }
  .page-header .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:600;letter-spacing:0.16em;
    text-transform:uppercase;color:#666;margin-bottom:12px;
  }
  .page-header h1{
    font-size:52px;font-weight:800;letter-spacing:-0.04em;
    line-height:1.0;color:#fff;
  }
  .page-header h1 span{color:#555}
  .page-header p{
    margin-top:16px;font-size:16px;color:#888;line-height:1.6;max-width:640px;font-weight:400;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:32px;
    padding:0 64px 80px;
  }
  @media(max-width:1400px){.grid{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}

  .style-card{display:flex;flex-direction:column;align-items:center}
  .phone-wrap{
    border-radius:28px;overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06);
    width:220px;height:456px;flex-shrink:0;
  }
  .phone-inner{
    width:390px;height:808px;
    transform:scale(0.5641);transform-origin:top left;
  }
  .style-num{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;font-weight:700;letter-spacing:0.14em;
    color:#444;margin-top:12px;text-transform:uppercase;
  }
  .style-name{
    font-size:13px;font-weight:700;color:#ddd;
    margin-top:4px;letter-spacing:-0.01em;text-align:center;
  }
  .style-tag{
    font-size:10.5px;color:#666;margin-top:2px;
    font-family:'JetBrains Mono',monospace;text-align:center;
  }

  /* ── PHONE SCREEN BASE ── */
  .screen{width:390px;height:808px;overflow:hidden;display:flex;flex-direction:column;position:relative}

  /* STATUS BAR */
  .sb{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;font-size:14px;font-weight:600;letter-spacing:-0.01em}

  /* BOTTOM NAV */
  .bnav{height:80px;display:flex;align-items:center;justify-content:space-around;padding:0 8px 16px;flex-shrink:0}
  .bni{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:600;flex:1;cursor:pointer;letter-spacing:0.02em}
  .bni svg{width:22px;height:22px}

  /* SHARED HELPERS */
  .txn-row{display:flex;align-items:center;gap:12px;padding:12px 0}
  .txn-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
  .txn-info{flex:1;min-width:0}
  .txn-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .txn-sub{font-size:11.5px;margin-top:2px;font-weight:500}
  .txn-amt{font-size:15px;font-weight:700;white-space:nowrap}
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">SpendWise · UI Design Exploration · May 2026</div>
  <h1>15 Style Previews<br/><span>Pick your favourite 4</span></h1>
  <p>Each phone shows the Home/Dashboard screen — same data, 15 completely different visual identities. Drawn from Revolut, Linear, Stripe, ui-ux-pro-max-skill (67 styles), and awesome-design-md (73+ brand systems).</p>
</div>

<div class="grid" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const TXNS = [
  { icon:'🍕', cat:'Food & Dining',  sub:'Zomato',      amt:'-₹480',  neg:true  },
  { icon:'🚌', cat:'Transport',       sub:'Auto Rickshaw',amt:'-₹85',  neg:true  },
  { icon:'💰', cat:'Salary',          sub:'HDFC Bank',   amt:'+₹45,000',neg:false },
  { icon:'🛒', cat:'Groceries',       sub:'D-Mart',      amt:'-₹1,240',neg:true  },
  { icon:'📱', cat:'Mobile',          sub:'Jio Recharge', amt:'-₹299', neg:true  },
];

function StatusBar({ color = '#fff' }) {
  return (
    <div className="sb" style={{ color }}>
      <span>9:41</span>
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        <svg viewBox="0 0 17 11" width="17" height="11"><g fill={color}>
          <rect x="0" y="7" width="3" height="4" rx="0.6"/>
          <rect x="4" y="5" width="3" height="6" rx="0.6"/>
          <rect x="8" y="2" width="3" height="9" rx="0.6"/>
          <rect x="12" y="0" width="3" height="11" rx="0.6"/>
        </g></svg>
        <svg viewBox="0 0 26 12" width="26" height="12">
          <rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke={color} strokeOpacity="0.4"/>
          <rect x="2" y="2" width="18" height="8" rx="1.4" fill={color}/>
          <rect x="23" y="4" width="2" height="4" rx="0.6" fill={color} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STYLE 01 — REVOLUT DARK
   Source: Revolut DESIGN.md — true black, cobalt violet, Aeonik Pro feel
   ══════════════════════════════════════════════════════════════ */
function Style01() {
  const s = { bg:'#000000', surf:'#16181a', accent:'#494fdf', ink:'#ffffff', ink2:'rgba(255,255,255,0.72)', ink3:'rgba(255,255,255,0.4)', ok:'#00a87e', danger:'#e23b4a', border:'rgba(255,255,255,0.08)', font:"'DM Sans', system-ui, sans-serif" };
  return (
    <div className="screen" style={{ background:s.bg, fontFamily:s.font }}>
      <StatusBar color={s.ink}/>
      {/* Header */}
      <div style={{ padding:'8px 24px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:s.ink3, fontFamily:"'JetBrains Mono',monospace" }}>May 2026</div>
          <div style={{ fontSize:26, fontWeight:700, letterSpacing:'-0.04em', color:s.ink, lineHeight:1.1, marginTop:2 }}>Dashboard</div>
        </div>
        <div style={{ width:38, height:38, borderRadius:999, background:s.surf, border:`1px solid ${s.border}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={s.ink2} strokeWidth="2" strokeLinecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </div>
      </div>
      {/* Balance card */}
      <div style={{ margin:'20px 24px 0', background:s.accent, borderRadius:20, padding:'22px 24px' }}>
        <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase', color:'rgba(255,255,255,0.7)', fontFamily:"'JetBrains Mono',monospace" }}>Total Balance</div>
        <div style={{ fontSize:38, fontWeight:700, letterSpacing:'-0.04em', color:'#fff', marginTop:6, lineHeight:1 }}>₹12,450<span style={{fontSize:22}}>.00</span></div>
        <div style={{ display:'flex', gap:24, marginTop:16 }}>
          {[['Income','₹45,000',s.ok],['Expense','₹32,550',s.danger]].map(([l,v,c])=>(
            <div key={l}>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.6)', fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase' }}>{l}</div>
              <div style={{ fontSize:16, fontWeight:700, color:c, marginTop:3 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Budget bar */}
      <div style={{ margin:'16px 24px 0', background:s.surf, borderRadius:14, padding:'14px 16px', border:`1px solid ${s.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
          <span style={{ fontSize:12, color:s.ink2, fontWeight:600 }}>Monthly Budget</span>
          <span style={{ fontSize:12, color:s.ink3, fontFamily:"'JetBrains Mono',monospace" }}>72%</span>
        </div>
        <div style={{ height:4, background:'rgba(255,255,255,0.08)', borderRadius:999 }}>
          <div style={{ height:4, width:'72%', background:s.accent, borderRadius:999 }}/>
        </div>
      </div>
      {/* Txns */}
      <div style={{ padding:'18px 24px 0', flex:1, overflow:'hidden' }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
          <span style={{ fontSize:13, fontWeight:700, color:s.ink }}>Recent</span>
          <span style={{ fontSize:11, color:s.accent, fontWeight:600 }}>See all</span>
        </div>
        {TXNS.slice(0,4).map((t,i)=>(
          <div key={i} className="txn-row" style={{ borderBottom:`1px solid ${s.border}`, fontFamily:s.font }}>
            <div className="txn-icon" style={{ background:s.surf }}>{t.icon}</div>
            <div className="txn-info">
              <div className="txn-title" style={{ color:s.ink }}>{t.cat}</div>
              <div className="txn-sub" style={{ color:s.ink3 }}>{t.sub}</div>
            </div>
            <div className="txn-amt" style={{ color:t.neg?s.danger:s.ok }}>{t.amt}</div>
          </div>
        ))}
      </div>
      {/* Bottom nav */}
      <div className="bnav" style={{ background:s.surf, borderTop:`1px solid ${s.border}` }}>
        {[['Home','M3 12l-8-8 8-8',true],['Wallet','M2 9h20v11a2 2 0 01-2 2H4a2 2 0 01-2-2V9zm0 0V7a2 2 0 012-2h3m8 0h3a2 2 0 012 2v2',false],['Chart','M3 3v18h18M7 16l4-4 4 4 5-5',false],['More','M12 5v.01M12 12v.01M12 19v.01',false]].map(([l,p,a])=>(
          <div key={l} className="bni" style={{ color:a?s.accent:s.ink3 }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={p}/></svg>
            <span>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STYLE 02 — LINEAR DARK
   Source: Linear DESIGN.md — near-black, lavender accent, dense technical
   ══════════════════════════════════════════════════════════════ */
function Style02() {
  const s = { bg:'#010102', surf:'#0f1011', surf2:'#141516', accent:'#5e6ad2', ink:'#f7f8f8', ink2:'#d0d6e0', ink3:'#8a8f98', ok:'#27a644', danger:'#e55b5b', border:'#23252a', font:"'Manrope', system-ui, sans-serif" };
  return (
    <div className="screen" style={{ background:s.bg, fontFamily:s.font }}>
      <StatusBar color={s.ink2}/>
      <div style={{ padding:'4px 22px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:11, fontWeight:500, letterSpacing:'0.4px', color:s.ink3 }}>MAY 2026</div>
          <div style={{ fontSize:28, fontWeight:600, letterSpacing:'-1.2px', color:s.ink, marginTop:1 }}>Overview</div>
        </div>
        <div style={{ width:36, height:36, borderRadius:8, background:s.surf, border:`1px solid ${s.border}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={s.ink3} strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
      </div>
      {/* Balance */}
      <div style={{ margin:'16px 22px 0', background:s.surf, borderRadius:12, padding:'20px', border:`1px solid ${s.border}` }}>
        <div style={{ fontSize:11, color:s.ink3, fontWeight:500, letterSpacing:'0.4px' }}>NET BALANCE</div>
        <div style={{ fontSize:36, fontWeight:600, letterSpacing:'-1.8px', color:s.ink, marginTop:4, lineHeight:1 }}>₹12,450<span style={{fontSize:20,color:s.ink3}}>.00</span></div>
        <div style={{ height:1, background:s.border, margin:'14px 0' }}/>
        <div style={{ display:'flex', gap:0 }}>
          {[['Income','₹45,000',s.ok],['Expense','₹32,550',s.danger],['Savings','26%',s.accent]].map(([l,v,c],i)=>(
            <div key={l} style={{ flex:1, borderRight:i<2?`1px solid ${s.border}`:'none', paddingRight:i<2?12:0, paddingLeft:i>0?12:0 }}>
              <div style={{ fontSize:10, color:s.ink3, fontWeight:500, letterSpacing:'0.3px', textTransform:'uppercase' }}>{l}</div>
              <div style={{ fontSize:15, fontWeight:600, color:c, marginTop:3, letterSpacing:'-0.4px' }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Quick pills */}
      <div style={{ padding:'14px 22px 0', display:'flex', gap:8 }}>
        {['All','Income','Expense','Loans'].map((p,i)=>(
          <div key={p} style={{ padding:'6px 12px', borderRadius:8, background:i===0?s.accent:s.surf, border:`1px solid ${i===0?s.accent:s.border}`, fontSize:11, fontWeight:500, color:i===0?'#fff':s.ink3, cursor:'pointer' }}>{p}</div>
        ))}
      </div>
      {/* Txns */}
      <div style={{ padding:'14px 22px 0', flex:1, overflow:'hidden' }}>
        {TXNS.slice(0,4).map((t,i)=>(
          <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:`1px solid ${s.border}` }}>
            <div style={{ width:38, height:38, borderRadius:10, background:s.surf2, border:`1px solid ${s.border}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>{t.icon}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:600, color:s.ink, letterSpacing:'-0.2px' }}>{t.cat}</div>
              <div style={{ fontSize:11, color:s.ink3, marginTop:1 }}>{t.sub}</div>
            </div>
            <div style={{ fontSize:14, fontWeight:600, color:t.neg?s.danger:s.ok, letterSpacing:'-0.3px' }}>{t.amt}</div>
          </div>
        ))}
      </div>
      <div className="bnav" style={{ background:s.surf, borderTop:`1px solid ${s.border}` }}>
        {[['Home',true],['Txns',false],['Budget',false],['More',false]].map(([l,a])=>(
          <div key={l} className="bni" style={{ color:a?s.accent:s.ink3 }}>
            <div style={{ width:22, height:22, borderRadius:6, background:a?s.accent:'transparent', border:a?'none':`1px solid ${s.border}` }}/>
            <span style={{fontSize:10}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STYLE 03 — STRIPE INDIGO
   Source: Stripe DESIGN.md — #533afd, weight-300, gradient mesh
   ══════════════════════════════════════════════════════════════ */
function Style03() {
  const s = { bg:'#f6f9fc', surf:'#ffffff', accent:'#533afd', ink:'#0d253d', ink2:'#64748d', ok:'#3dba6d', danger:'#e53935', border:'#e3e8ee', font:"'Outfit', system-ui, sans-serif" };
  return (
    <div className="screen" style={{ background:s.bg, fontFamily:s.font }}>
      {/* Gradient hero */}
      <div style={{ background:'linear-gradient(135deg,#1c1e54 0%,#533afd 50%,#f96bee 100%)', padding:'0 0 32px' }}>
        <StatusBar color="rgba(255,255,255,0.9)"/>
        <div style={{ padding:'4px 24px 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div style={{ fontSize:11, fontWeight:400, color:'rgba(255,255,255,0.6)', letterSpacing:'0.5px' }}>May 2026</div>
            <div style={{ fontSize:32, fontWeight:300, color:'#fff', letterSpacing:'-1.4px', marginTop:2, lineHeight:1 }}>₹12,450<span style={{fontSize:20}}>.00</span></div>
            <div style={{ fontSize:13, color:'rgba(255,255,255,0.7)', marginTop:4, fontWeight:300 }}>Total balance this month</div>
          </div>
          <div style={{ width:38, height:38, borderRadius:999, background:'rgba(255,255,255,0.15)', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          </div>
        </div>
        {/* Income/Expense pills */}
        <div style={{ display:'flex', gap:10, margin:'16px 24px 0' }}>
          {[['↑ Income','₹45,000',s.ok],['↓ Expense','₹32,550','#ff6b6b']].map(([l,v,c])=>(
            <div key={l} style={{ flex:1, background:'rgba(255,255,255,0.15)', borderRadius:999, padding:'8px 14px', backdropFilter:'blur(10px)' }}>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.7)', fontWeight:400, letterSpacing:'0.3px' }}>{l}</div>
              <div style={{ fontSize:15, fontWeight:600, color:'#fff', marginTop:1 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Budget */}
      <div style={{ margin:'16px 20px 0', background:s.surf, borderRadius:14, padding:'14px 16px', border:`1px solid ${s.border}`, boxShadow:'0 2px 8px rgba(83,58,253,0.08)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
          <span style={{ fontSize:12, color:s.ink, fontWeight:500 }}>Budget used</span>
          <span style={{ fontSize:12, color:s.accent, fontWeight:600 }}>72% · ₹13,450 left</span>
        </div>
        <div style={{ height:5, background:s.border, borderRadius:999 }}>
          <div style={{ height:5, width:'72%', background:`linear-gradient(90deg,${s.accent},#f96bee)`, borderRadius:999 }}/>
        </div>
      </div>
      {/* Txns */}
      <div style={{ padding:'16px 20px 0', flex:1, overflow:'hidden' }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
          <span style={{ fontSize:14, fontWeight:600, color:s.ink }}>Transactions</span>
          <span style={{ fontSize:12, color:s.accent, fontWeight:500 }}>View all</span>
        </div>
        {TXNS.slice(0,4).map((t,i)=>(
          <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'9px 0', borderBottom:`1px solid ${s.border}` }}>
            <div style={{ width:40, height:40, borderRadius:12, background:`${s.accent}15`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>{t.icon}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:500, color:s.ink }}>{t.cat}</div>
              <div style={{ fontSize:11, color:s.ink2 }}>{t.sub}</div>
            </div>
            <div style={{ fontSize:14, fontWeight:600, color:t.neg?s.danger:s.ok }}>{t.amt}</div>
          </div>
        ))}
      </div>
      <div className="bnav" style={{ background:s.surf, borderTop:`1px solid ${s.border}` }}>
        {[['Home',true],['Txns',false],['Budget',false],['More',false]].map(([l,a])=>(
          <div key={l} className="bni" style={{ color:a?s.accent:s.ink2 }}>
            <div style={{ width:24, height:24, borderRadius:999, background:a?s.accent:'transparent', border:a?'none':`1px solid ${s.border}` }}/>
            <span style={{fontSize:10,fontWeight:a?600:400}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STYLE 04 — WARM PAPER / EDITORIAL
   Source: DocVault example — cream palette, Plus Jakarta Sans, JetBrains Mono
   ══════════════════════════════════════════════════════════════ */
function Style04() {
  const s = { bg:'#F0EEE9', surf:'#fff', accent:'#14110F', ink:'#14110F', ink2:'#6A6259', ink3:'#A39A8E', ok:'#3F6D3A', danger:'#A8451D', border:'#E0DAD0', font:"'Plus Jakarta Sans', system-ui, sans-serif" };
  return (
    <div className="screen" style={{ background:s.bg, fontFamily:s.font }}>
      <StatusBar color={s.ink}/>
      <div style={{ padding:'4px 24px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase', color:s.ink3, fontFamily:"'JetBrains Mono',monospace" }}>May · 2026</div>
          <div style={{ fontSize:28, fontWeight:700, letterSpacing:'-0.04em', color:s.ink, marginTop:3, lineHeight:1.05 }}>SpendWise</div>
