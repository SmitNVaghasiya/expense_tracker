<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Document Sorter — Web Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #F4F2EE; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #14110F; }
  *, *::before, *::after { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #E0DAD0; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="webapp/browser-window.jsx"></script>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/primitives.jsx"></script>
<script type="text/babel" src="app/pipeline-data.jsx"></script>
<script type="text/babel" src="webapp/web-primitives.jsx"></script>
<script type="text/babel" src="webapp/web-views-1.jsx"></script>
<script type="text/babel" src="webapp/web-views-2.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function WebApp() {
  const [view, setView] = useState('dashboard');
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(x => x + 1), 200);
    return () => clearInterval(id);
  }, []);
  const cycle = (tick % 200) / 200;
  const telemetry = deriveStatus(cycle);
  const accent = 'oklch(64% 0.11 155)';

  const VIEWS = {
    dashboard:  <ViewDashboard accent={accent} telemetry={telemetry}/>,
    pipeline:   <ViewPipeline  accent={accent} telemetry={telemetry}/>,
    duplicates: <ViewDuplicates accent={accent}/>,
    clusters:   <ViewClusters  accent={accent}/>,
    files:      <ViewFiles     accent={accent}/>,
    settings:   <ViewSettings  accent={accent}/>,
  };

  return (
    <div style={{ minHeight: '100vh', padding: 32, background: '#E8E4DD',
      display: 'flex', justifyContent: 'center' }}>
      <ChromeWindow
        url="127.0.0.1:8000/console"
        tabs={[{ title: 'Document Sorter', active: true }, { title: 'localhost:8000/docs' }]}
        activeIndex={0}
        width={1280}
        height={900}
      >
        <div style={{ display: 'flex', height: '100%', background: '#F4F2EE' }}>
          <Sidebar active={view} onPick={setView} telemetry={telemetry}/>
          <div style={{ flex: 1, overflow: 'auto', padding: 28 }}>
            {VIEWS[view]}
          </div>
        </div>
      </ChromeWindow>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WebApp/>);
</script>
</body>
</html>
