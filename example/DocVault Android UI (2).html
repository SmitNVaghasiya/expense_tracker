<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>DocVault — Android UI Design Pack</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #ECE9E2;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: #14110F;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes dvSlide { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes dvFade  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dvShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }

  .page {
    width: 1280px;
    margin: 0 auto;
    padding: 44px 56px 56px;
    background: #F0EEE9;
    border-bottom: 1px solid #E0DAD0;
    break-after: page;
    page-break-after: always;
    display: flex; flex-direction: column;
  }
  .page:last-child { break-after: auto; page-break-after: auto; border-bottom: none; }

  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid #E0DAD0;
  }
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: #7A736B;
    font-family: 'JetBrains Mono', monospace;
  }
  .page-title {
    font-size: 30px; font-weight: 700; letter-spacing: -0.025em;
    margin-top: 8px; line-height: 1.05;
  }
  .page-num {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: #7A736B; letter-spacing: 0.16em; font-weight: 600;
  }

  .phone-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 36px;
    justify-items: center;
  }
  .phone-row.three { grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .phone-row.one   { grid-template-columns: 1fr; }
  .phone-block { display: flex; flex-direction: column; align-items: center; }
  .phone-cap {
    font-size: 12px; font-weight: 600; color: #14110F; margin-top: 16px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; text-align: center;
  }
  .phone-cap-num {
    font-size: 10.5px; font-weight: 700; color: #A39A8E; letter-spacing: 0.16em;
    margin-top: 4px; font-family: 'JetBrains Mono', monospace;
  }
  .phone-frame {
    border-radius: 30px; overflow: hidden;
    box-shadow: 0 10px 32px rgba(20,17,15,0.10), 0 0 0 1px #E0DAD0;
    background: #F0EEE9;
  }
  .phone-frame.three { border-radius: 24px; }

  /* Note callout */
  .note {
    margin-top: 24px;
    padding: 16px 18px;
    background: #FFFFFF;
    border: 1px solid #E0DAD0;
    border-radius: 14px;
    font-size: 12.5px; color: #3A3631; line-height: 1.55;
    max-width: 720px;
  }
  .note strong { color: #14110F; font-weight: 700; }
  .note .note-eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #7A736B;
    font-family: 'JetBrains Mono', monospace; margin-bottom: 4px;
  }

  @page { size: A3 landscape; margin: 1cm; }
  @media print {
    html, body { background: #fff; }
    .page { padding: 32px 40px 40px; border: none; }
    .phone-row { gap: 28px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="phone-shell.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="screens-3.jsx"></script>
<script type="text/babel" src="pack.jsx"></script>
</body>
</html>
